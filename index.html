<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>團購文案格式工具</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --btn-primary-text: #0f0f0f;
    --btn-secondary: #2a2a2a;
    --btn-secondary-hover: #333;
    --btn-danger: #1e1414;
    --btn-danger-border: #4a2a2a;
    --btn-danger-text: #e88;
    --btn-danger-hover: #2a1818;
    --green: #4caf7d;
    --green-bg: #0d1f14;
    --green-border: #1a3a28;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    padding: 16px;
    font-size: 15px;
    line-height: 1.6;
  }

  .container { max-width: 640px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--text3); font-weight: 400; margin-left: 6px; font-size: 13px; }

  .user-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text2);
  }
  .user-badge .nickname { color: var(--text); font-weight: 500; }
  .user-badge .btn-settings {
    background: none; border: 1px solid var(--border2);
    color: var(--text3); font-size: 11px;
    padding: 3px 9px; border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .user-badge .btn-settings:hover { color: var(--text); border-color: var(--border2); }

  /* ── Modal ────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 24px;
    width: 100%; max-width: 420px;
  }
  .modal-title {
    font-size: 16px; font-weight: 600; margin-bottom: 6px;
  }
  .modal-subtitle {
    font-size: 13px; color: var(--text3); margin-bottom: 20px; line-height: 1.5;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px;
  }
  .modal-field input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: 14px;
    padding: 10px 12px; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .modal-field input:focus { outline: none; border-color: var(--border2); }
  .modal-field input::placeholder { color: var(--text3); }
  .modal-error {
    font-size: 12px; color: #e77; margin-top: 10px; display: none;
  }
  .btn-modal-submit {
    width: 100%; background: #f0f0f0; color: var(--btn-primary-text);
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600; padding: 12px 16px;
    margin-top: 6px; cursor: pointer; font-family: inherit;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-modal-submit:hover { background: #d8d8d8; }
  .btn-modal-submit:disabled { opacity: 0.45; pointer-events: none; }

  /* ── Settings card ───────────────────────── */
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .settings-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    color: var(--text3); text-transform: uppercase;
    margin-bottom: 10px;
  }

  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }

  .field-label {
    font-size: 11px; color: var(--text3);
    margin-bottom: 5px; display: block;
  }

  .field-row { display: flex; gap: 7px; align-items: center; }

  .field-row input, .field-row select, .field-row textarea.small {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 11px;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field-row textarea.small {
    resize: vertical; min-height: 60px; line-height: 1.5;
  }

  .field-row input:focus,
  .field-row select:focus,
  .field-row textarea.small:focus { outline: none; border-color: var(--border2); }
  .field-row input::placeholder,
  .field-row textarea.small::placeholder { color: var(--text3); }
  .field-row select option { background: var(--surface2); }

  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-size: 12px; font-weight: 500;
    padding: 8px 13px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-sm:hover { background: var(--btn-secondary-hover); color: var(--text); }

  .saved-msg { font-size: 11px; color: var(--green); margin-top: 6px; display: none; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--text3); text-transform: uppercase; margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.75;
    padding: 14px 16px;
    resize: vertical;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  textarea:focus { outline: none; border-color: var(--border2); }
  textarea::placeholder { color: var(--text3); }
  #inputText { min-height: 200px; }
  #outputText { min-height: 280px; background: var(--surface2); }

  .btn-submit {
    width: 100%;
    background: #f0f0f0;
    color: var(--btn-primary-text);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600;
    padding: 13px 16px;
    margin-top: 10px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-family: inherit;
    letter-spacing: -0.2px;
  }
  .btn-submit:hover { background: #d8d8d8; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.45; pointer-events: none; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .status-bar {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 8px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); display: inline-block; margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: #e55; }
  .status-text { font-size: 12px; color: var(--text3); display: flex; align-items: center; }
  .char-count { font-size: 12px; color: var(--text3); }

  .btn-copy {
    width: 100%;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    color: var(--green);
    font-size: 14px; font-weight: 500;
    padding: 11px 16px; margin-top: 10px;
    cursor: pointer; border-radius: var(--radius-sm);
    transition: all 0.15s; font-family: inherit;
  }
  .btn-copy:hover { background: #0f2a1c; }
  .btn-copy:active { transform: scale(0.99); }
  .btn-copy.copied { color: #fff; background: #1a4030; }

  .fix-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    color: var(--text3); text-transform: uppercase;
    margin: 20px 0 9px;
  }

  .btn-group { display: flex; flex-direction: column; gap: 8px; }
  .btn-row { display: flex; gap: 8px; }

  .btn-fix {
    flex: 1;
    background: var(--btn-secondary);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    padding: 10px 12px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    line-height: 1.4; text-align: center;
  }
  .btn-fix:hover { background: var(--btn-secondary-hover); border-color: #484848; }
  .btn-fix:active { transform: scale(0.98); }
  .btn-fix:disabled { opacity: 0.35; pointer-events: none; }

  .btn-recheck {
    width: 100%;
    background: var(--btn-danger);
    border: 1px solid var(--btn-danger-border);
    color: var(--btn-danger-text);
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    padding: 10px 16px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-recheck:hover { background: var(--btn-danger-hover); }
  .btn-recheck:active { transform: scale(0.98); }
  .btn-recheck:disabled { opacity: 0.35; pointer-events: none; }

  .btn-clear {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 13px; font-weight: 500;
    padding: 9px 16px;
    margin-top: 7px;
    cursor: pointer; border-radius: var(--radius-sm);
    transition: all 0.15s; font-family: inherit;
  }
  .btn-clear:hover { background: var(--btn-danger-hover); border-color: var(--btn-danger-border); color: var(--btn-danger-text); }
  .btn-clear:active { transform: scale(0.99); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin {
    width: 13px; height: 13px;
    border: 2px solid rgba(0,0,0,0.15);
    border-top-color: #333;
    border-radius: 50%;
    animation: spin 0.55s linear infinite;
    display: none; flex-shrink: 0;
  }
  .spin.light {
    border-color: rgba(255,255,255,0.15);
    border-top-color: currentColor;
  }
  .spinning { display: block; }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .btn-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">團購文案格式工具</div>
    <div class="user-badge" id="userBadge" style="display:none">
      <span class="nickname" id="headerNickname"></span>
      <button class="btn-settings" onclick="openSettings()">設定</button>
    </div>
  </header>

  <!-- 初次使用 Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title">歡迎使用</div>
      <div class="modal-subtitle">請輸入你的 Email 和暱稱，以便儲存你的個人設定。<br>下次使用同一 Email 即可自動恢復設定。</div>
      <div class="modal-field">
        <label>Email</label>
        <input type="email" id="modalEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="modal-field">
        <label>暱稱</label>
        <input type="text" id="modalNickname" placeholder="例如：小美" maxlength="20">
      </div>
      <div class="modal-error" id="modalError"></div>
      <button class="btn-modal-submit" id="btnModalSubmit" onclick="submitRegistration()">
        <span class="spin" id="spinModal"></span>
        開始使用
      </button>
    </div>
  </div>

  <!-- 個人設定 -->
  <div class="settings-card" id="settingsCard" style="display:none">
    <div class="settings-title">個人設定</div>

    <div class="field">
      <span class="field-label">暱稱</span>
      <div class="field-row">
        <input type="text" id="settingsNickname" maxlength="20">
      </div>
    </div>

    <div class="field">
      <span class="field-label">預設 AI 模型</span>
      <div class="field-row">
        <select id="modelSelect">
          <option value="openai">OpenAI — GPT-4o mini（較快）</option>
          <option value="anthropic">Anthropic — Claude Haiku（較省）</option>
        </select>
      </div>
    </div>

    <div class="field">
      <span class="field-label">取貨地點（無規格商品）</span>
      <div class="field-row">
        <input type="text" id="pickupNv" placeholder="A.枋寮、B.林邊、C.恆春⚠️下單請加選項註明取貨地點">
      </div>
    </div>

    <div class="field">
      <span class="field-label">取貨地點（有規格商品）</span>
      <div class="field-row">
        <input type="text" id="pickupHv" placeholder="枋寮、林邊、恆春">
      </div>
    </div>

    <div class="field">
      <span class="field-label">補充格式要求（選填，最多 500 字）</span>
      <div class="field-row">
        <textarea class="small" id="customInstructions" maxlength="500"
          placeholder="例如：此商品為預購，請在結尾加上預計出貨日期說明。"></textarea>
      </div>
    </div>

    <div class="field-row" style="margin-top:4px">
      <button class="btn-sm" onclick="saveSettings()">儲存設定</button>
      <button class="btn-sm" onclick="closeSettings()">取消</button>
    </div>
    <div class="saved-msg" id="savedMsg">✓ 設定已儲存</div>
  </div>

  <!-- 輸入 -->
  <div class="section-label">原始文案</div>
  <textarea id="inputText" placeholder="請貼上團購原文..."></textarea>

  <!-- 送出 -->
  <button class="btn-submit" id="btnSubmit" onclick="runFormat('default')">
    <span class="spin" id="spinSubmit"></span>
    送出
  </button>

  <!-- 清除原始文案 -->
  <button class="btn-clear" id="btnClear" onclick="clearInput()">清除原始文案</button>

  <hr class="divider">

  <!-- 輸出 -->
  <div class="status-bar">
    <div class="status-text">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">等待輸入</span>
    </div>
    <div class="char-count" id="charCount"></div>
  </div>

  <textarea id="outputText" placeholder="格式化後的文案將出現在這裡..." readonly></textarea>
  <button class="btn-copy" id="copyBtn" onclick="copyOutput()">複製文案</button>

  <!-- 修正按鈕 -->
  <div class="fix-label">重新修正</div>
  <div class="btn-group">
    <div class="btn-row">
      <button class="btn-fix" id="btnNoVariant" onclick="runFormat('no-variant')">
        <span class="spin light" id="spinNoVariant"></span>
        無規格 → 修正取貨地區
      </button>
      <button class="btn-fix" id="btnVariant" onclick="runFormat('has-variant')">
        <span class="spin light" id="spinVariant"></span>
        有規格 → 修正取貨地區
      </button>
    </div>
    <button class="btn-recheck" id="btnRecheck" onclick="runFormat('recheck')">
      <span class="spin light" id="spinRecheck"></span>
      ⟳ 其他錯誤 — 重新檢視整篇文章後重新產出
    </button>
  </div>

</div>
<script>
// ── Supabase 設定 ────────────────────────────────────────
const SUPABASE_URL  = 'https://wshdgztjurzihjpovdqt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzaGRnenRqdXJ6aWhqcG92ZHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTMxMzgsImV4cCI6MjA5MTA2OTEzOH0.M_n4PBHCpkwnMMbMwk2-SiJ2-zn-OaelFnFuaxvJpbA';

function sbFetch(action, body) {
  return fetch(`${SUPABASE_URL}/functions/v1/groupbuy`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${SUPABASE_ANON}`
    },
    body: JSON.stringify({ action, ...body })
  });
}

// ── 常數 ────────────────────────────────────────────────
const SPINNER_MAP = {
  'default':    'spinSubmit',
  'no-variant': 'spinNoVariant',
  'has-variant':'spinVariant',
  'recheck':    'spinRecheck'
};
const ALL_BTNS = ['btnSubmit', 'btnNoVariant', 'btnVariant', 'btnRecheck'];

// ── 主流程 ─────────────────────────────────────────────
async function runFormat(mode) {
  const userId = localStorage.getItem('gb_user_id');
  const model  = localStorage.getItem('gb_model') || 'openai';
  if (!userId) { showModal(); return; }

  const inputText = document.getElementById('inputText').value.trim();
  if (!inputText) { setStatus('請先貼上原始文案', 'idle'); return; }

  const fixModes = ['no-variant', 'has-variant', 'recheck'];
  const outputEl  = document.getElementById('outputText');
  const outputVal = (outputEl.value || '').trim();

  if (fixModes.includes(mode) && !outputVal) {
    setStatus('請先執行一次格式修正，再使用重新修正功能', 'idle');
    return;
  }

  const sourceText = fixModes.includes(mode) ? outputVal : inputText;

  setLoading(true, mode);
  setStatus('送出中...', 'idle');

  try {
    const res = await sbFetch('format', { user_id: userId, mode, text: sourceText, model });

    if (res.status === 401) throw new Error('身份驗證失敗，請重新整理頁面');
    if (res.status === 429) throw new Error('已達每小時使用上限，請稍後再試');
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || '格式化失敗，請稍後再試');
    }

    const data = await res.json();
    const result = data.result || '';
    document.getElementById('outputText').value = result;
    document.getElementById('charCount').textContent = result.length + ' 字';
    setStatus('完成', 'ok');

  } catch (err) {
    setStatus('錯誤：' + err.message, 'err');
  } finally {
    setLoading(false, mode);
  }
}

// ── 初次使用 Modal ──────────────────────────────────────
function showModal() {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modalEmail').focus();
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function submitRegistration() {
  const email    = document.getElementById('modalEmail').value.trim();
  const nickname = document.getElementById('modalNickname').value.trim();
  const errEl    = document.getElementById('modalError');
  errEl.style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = '請輸入有效的 Email';
    errEl.style.display = 'block'; return;
  }
  if (!nickname) {
    errEl.textContent = '請輸入暱稱';
    errEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('btnModalSubmit');
  const sp  = document.getElementById('spinModal');
  btn.disabled = true; sp.classList.add('spinning');

  try {
    const res  = await sbFetch('identify', { email, nickname });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '連線失敗');

    localStorage.setItem('gb_user_id',  data.user_id);
    localStorage.setItem('gb_email',    email);
    localStorage.setItem('gb_nickname', data.nickname);
    applySettings(data.settings);
    updateHeader(data.nickname);
    hideModal();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; sp.classList.remove('spinning');
  }
}

// ── 個人設定 ────────────────────────────────────────────
function openSettings() {
  document.getElementById('settingsCard').style.display = 'block';
  document.getElementById('settingsNickname').value = localStorage.getItem('gb_nickname') || '';
  document.getElementById('modelSelect').value      = localStorage.getItem('gb_model') || 'openai';
  document.getElementById('pickupNv').value         = localStorage.getItem('gb_pickup_nv') || '';
  document.getElementById('pickupHv').value         = localStorage.getItem('gb_pickup_hv') || '';
  document.getElementById('customInstructions').value = localStorage.getItem('gb_custom_instr') || '';
}

function closeSettings() {
  document.getElementById('settingsCard').style.display = 'none';
}

async function saveSettings() {
  const userId   = localStorage.getItem('gb_user_id');
  if (!userId) return;
  const nickname = document.getElementById('settingsNickname').value.trim();
  const model    = document.getElementById('modelSelect').value;
  const pickupNv = document.getElementById('pickupNv').value.trim();
  const pickupHv = document.getElementById('pickupHv').value.trim();
  const customInstructions = document.getElementById('customInstructions').value.trim();

  try {
    const res = await sbFetch('settings', {
      user_id: userId, nickname, model,
      pickup_no_variant: pickupNv,
      pickup_has_variant: pickupHv,
      custom_instructions: customInstructions
    });
    if (!res.ok) throw new Error();
    applySettings({ model, pickup_no_variant: pickupNv, pickup_has_variant: pickupHv, custom_instructions: customInstructions });
    if (nickname) { localStorage.setItem('gb_nickname', nickname); updateHeader(nickname); }
    const msg = document.getElementById('savedMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; closeSettings(); }, 1500);
  } catch {
    alert('儲存失敗，請稍後再試');
  }
}

function applySettings(s) {
  if (!s) return;
  if (s.model)               localStorage.setItem('gb_model', s.model);
  if (s.pickup_no_variant  !== undefined) localStorage.setItem('gb_pickup_nv', s.pickup_no_variant);
  if (s.pickup_has_variant !== undefined) localStorage.setItem('gb_pickup_hv', s.pickup_has_variant);
  if (s.custom_instructions !== undefined) localStorage.setItem('gb_custom_instr', s.custom_instructions);
}

function updateHeader(nickname) {
  document.getElementById('headerNickname').textContent = nickname;
  document.getElementById('userBadge').style.display = 'flex';
}

// ── 狀態 & Loading ──────────────────────────────────────
function setStatus(msg, state) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  txt.textContent = msg;
  dot.className = 'status-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
  txt.style.color = state === 'ok' ? 'var(--green)' : state === 'err' ? '#e77' : 'var(--text3)';
}

function setLoading(on, mode) {
  ALL_BTNS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = on;
  });
  const sp = document.getElementById(SPINNER_MAP[mode]);
  if (sp) sp.classList.toggle('spinning', on);
}

// ── 清除原始文案 ────────────────────────────────────────
function clearInput() {
  const el = document.getElementById('inputText');
  el.value = '';
  el.focus();
  setStatus('等待輸入', 'idle');
}

// ── 複製 ────────────────────────────────────────────────
function copyOutput() {
  const text = document.getElementById('outputText').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製文案'; btn.classList.remove('copied'); }, 2200);
  });
}

// ── 初始化 ──────────────────────────────────────────────
(async function init() {
  const userId = localStorage.getItem('gb_user_id');
  const email  = localStorage.getItem('gb_email');

  if (!userId || !email) {
    showModal(); return;
  }

  // 已有 userId：重新拉設定確認帳號仍存在
  try {
    const res  = await sbFetch('identify', { email, nickname: '' });
    const data = await res.json();
    if (!res.ok || !data.user_id) throw new Error();
    localStorage.setItem('gb_user_id', data.user_id);
    applySettings(data.settings);
    updateHeader(data.nickname || localStorage.getItem('gb_nickname') || '');
  } catch {
    // 帳號不存在或網路錯誤 → 顯示 modal 讓使用者重新登記
    localStorage.removeItem('gb_user_id');
    showModal();
    return;
  }

  document.getElementById('inputText').addEventListener('input', function() {
    setStatus(this.value.trim() ? '就緒，點擊送出開始格式化' : '等待輸入', 'idle');
  });
})();
</script>
